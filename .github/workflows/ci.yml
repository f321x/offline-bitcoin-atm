name: CI

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests (x86)
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86-tests

      - name: Run unit tests
        run: cargo test --lib --no-default-features --target x86_64-unknown-linux-gnu

  build-esp32:
    name: Build ESP32
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32
          ldproxy: true

      - name: Install python3-venv
        run: sudo apt-get update && sudo apt-get install -y python3-venv

      - uses: Swatinem/rust-cache@v2
        with:
          key: esp32-build
          cache-directories: ~/.espressif

      - name: Build
        run: cargo build
