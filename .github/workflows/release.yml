name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32
          ldproxy: true

      - name: Install python3-venv
        run: sudo apt-get update && sudo apt-get install -y python3-venv

      - uses: Swatinem/rust-cache@v2
        with:
          key: esp32-release
          cache-directories: ~/.espressif

      - name: Install espflash
        run: cargo install espflash --locked

      - name: Build release firmware
        run: cargo build --release

      - name: Prepare release artifacts
        run: |
          espflash save-image --chip esp32 --merge target/xtensa-esp32-espidf/release/offline-bitcoin-atm firmware-${{ github.ref_name }}.bin
          cp target/xtensa-esp32-espidf/release/offline-bitcoin-atm firmware-${{ github.ref_name }}.elf

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Version ${{ github.ref_name }}"
          body: |
            ## Flashing Instructions

            **Easiest:** Flash directly from your browser (Chrome/Edge) — no tools needed:
            **https://${{ github.repository_owner }}.github.io/offline-bitcoin-atm/**

            **Alternative:** Flash manually with esptool:
            ```bash
            pip install esptool
            esptool.py --chip esp32 --port /dev/ttyUSB0 --baud 460800 write_flash 0x0 firmware-${{ github.ref_name }}.bin
            ```

            After flashing, the ATM starts a WiFi access point for initial configuration.
            See the [README](https://github.com/${{ github.repository }}/blob/master/README.md) for full setup instructions.
          files: |
            firmware-${{ github.ref_name }}.bin
            firmware-${{ github.ref_name }}.elf

      - name: Prepare Pages directory
        run: |
          mkdir _site
          cp web-flasher/index.html _site/
          cp firmware-${{ github.ref_name }}.bin _site/firmware.bin
          cat > _site/manifest.json << EOF
          {
            "name": "Offline Bitcoin ATM",
            "version": "${{ github.ref_name }}",
            "builds": [
              {
                "chipFamily": "ESP32",
                "parts": [
                  { "path": "firmware.bin", "offset": 0 }
                ]
              }
            ]
          }
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
